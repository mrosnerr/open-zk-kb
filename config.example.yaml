# open-zk-kb configuration
# Location: ~/.config/open-zk-kb/config.yaml
#
# Copy this file there and fill in your values:
#   mkdir -p ~/.config/open-zk-kb
#   cp config.example.yaml ~/.config/open-zk-kb/config.yaml

# ─── Core Settings ───────────────────────────────────────────────────────────

# vault: ~/.local/share/open-zk-kb       # Where notes are stored (default shown)
# logLevel: INFO                          # DEBUG | INFO | WARN | ERROR
# lifecycle:
#   reviewAfterDays: 14                   # Days before a note is surfaced for review
#   promotionThreshold: 2                 # Accesses needed to recommend promotion
#   exemptKinds:                          # Kinds exempt from review
#     - personalization
#     - decision

# ─── Embeddings ──────────────────────────────────────────────────────────────
# Local embeddings (23MB MiniLM model) are enabled by default — no config needed.
# To use an API provider instead, uncomment below:

# embeddings:
#   provider: api
#   model: openai/text-embedding-3-small  # Any embeddings model
#   dimensions: 1536                      # Must match model's output dimensions
#   base_url: https://openrouter.ai/api/v1
#   api_key: "your-api-key-here"

# To disable embeddings entirely (keyword search only):
# embeddings:
#   enabled: false
