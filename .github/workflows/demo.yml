name: Pi demo media

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - '.github/workflows/demo.yml'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'src/**'
      - 'scripts/pi-demo/**'

permissions:
  contents: read

env:
  VHS_DEB_SHA256: 59dfd17f218082cf8a41596050dff6cf968c2094c6220c04915c51f426666b50

concurrency:
  group: pi-demo-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  technical-check:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node for Pi
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22.19.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install project and Pi
        run: |
          bun install --frozen-lockfile
          bun install --global @earendil-works/pi-coding-agent@0.80.10

      - name: Install FFmpeg, ttyd, and VHS
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.10.0/vhs_0.10.0_amd64.deb -o vhs.deb
          echo "$VHS_DEB_SHA256  vhs.deb" | sha256sum --check --strict
          sudo apt-get install -y ./vhs.deb
          rm vhs.deb

      - name: Run credential-free technical capture
        run: |
          unset OPENROUTER_API_KEY
          bun run demo:pi:audit
          bun run demo:pi:technical
          test -f .tmp/pi-demo/staged/package/dist/pi/extension.js
          test -d .tmp/pi-demo/xdg/data/open-zk-kb
          test ! -e .tmp/pi-demo/home/.local/share/open-zk-kb

      - name: Upload technical capture
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pi-demo-technical-${{ github.run_id }}
          path: |
            .tmp/pi-demo/pi-demo-technical.mp4
            .tmp/pi-demo/pi-demo-technical.png
          if-no-files-found: error
          retention-days: 7

  release-media:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Require dev source branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/dev" ]; then
            echo "Release media must be dispatched from dev, got $GITHUB_REF" >&2
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: dev
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node for Pi
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22.19.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install project and Pi
        run: |
          bun install --frozen-lockfile
          bun install --global @earendil-works/pi-coding-agent@0.80.10

      - name: Install FFmpeg, ttyd, and VHS
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.10.0/vhs_0.10.0_amd64.deb -o vhs.deb
          echo "$VHS_DEB_SHA256  vhs.deb" | sha256sum --check --strict
          sudo apt-get install -y ./vhs.deb
          rm vhs.deb

      - name: Record and validate OpenRouter release media
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: bun run demo:pi:release

      - name: Promote validated release media
        run: |
          cp .tmp/pi-demo/release-candidate/pi-demo.mp4 assets/pi-demo.mp4
          cp .tmp/pi-demo/release-candidate/pi-demo.png assets/pi-demo.png

      - name: Upload release media for review
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pi-demo-release-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            assets/pi-demo.mp4
            assets/pi-demo.png
          if-no-files-found: error
          retention-days: 30

      - name: Create review branch and pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/pi-demo-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add assets/pi-demo.mp4 assets/pi-demo.png
          if git diff --cached --quiet; then
            echo "Generated media matches dev; no review PR required"
            exit 0
          fi
          git commit -m "Update Pi demo media"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/$branch"
          body_file="$(mktemp)"
          cat >"$body_file" <<EOF
          ## OpenRouter Pi demo review

          Generated from \`dev\` by workflow run ${GITHUB_RUN_ID}, attempt ${GITHUB_RUN_ATTEMPT}.

          Review both \`assets/pi-demo.png\` and \`assets/pi-demo.mp4\`. Merge only if the cooking-preference, Rust-macros explanation, knowledge-health result, spacing, and renderer presentation are acceptable.

          Workflow: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          if ! gh pr create \
            --base dev \
            --head "$branch" \
            --title "Review Pi demo media" \
            --body-file "$body_file"; then
            echo "Unable to create the review PR. Ensure the repository allows GitHub Actions to create pull requests." >&2
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ":refs/heads/$branch" || true
            exit 1
          fi
