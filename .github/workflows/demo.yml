name: Demo GIF

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'scripts/demo-mcp.ts'
      - 'scripts/demo.tape'

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Install ffmpeg and ttyd
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd

      - name: Install VHS
        run: |
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.10.0/vhs_0.10.0_amd64.deb -o vhs.deb
          sudo apt-get install -y ./vhs.deb
          rm vhs.deb

      - name: Record demo GIF
        run: vhs scripts/demo.tape

      - name: Verify GIF exists
        run: test -f assets/demo.gif && echo "GIF recorded successfully ($(du -h assets/demo.gif | cut -f1))"

      - name: Commit updated GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/demo.gif
          if git diff --cached --quiet; then
            echo "No changes to demo GIF"
          else
            git commit -m "Update demo GIF"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          fi
