name: Publish to npm

on:
  push:
    branches: [main, dev]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine release type
        id: release
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            LOCAL_VERSION=$(node -p "require('./package.json').version")
            echo "version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "type=stable" >> "$GITHUB_OUTPUT"
            if echo "$LOCAL_VERSION" | grep -qE '(alpha|beta|rc)'; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            BASE_VERSION=$(node -p "require('./package.json').version")
            SHORT_SHA=$(git rev-parse --short HEAD)
            DEV_VERSION="${BASE_VERSION}-dev.g${SHORT_SHA}"
            echo "version=$DEV_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=dev" >> "$GITHUB_OUTPUT"
            echo "type=dev" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Unexpected branch '${{ github.ref_name }}' — skipping publish."
            echo "type=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if version already published
        if: steps.release.outputs.type != 'skip'
        id: check
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          PUBLISHED=$(npm view open-zk-kb@"$VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already published — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION not yet published — will publish."
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: bun install

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: bun run build

      - name: Lint
        if: steps.check.outputs.skip == 'false'
        run: bun run lint

      - name: Test
        if: steps.check.outputs.skip == 'false'
        run: bun test

      - name: Prepare bin scripts
        if: steps.check.outputs.skip == 'false'
        run: chmod +x dist/cli.js dist/setup.js dist/mcp-server.js

      - name: Set dev version in package.json
        if: steps.check.outputs.skip == 'false' && steps.release.outputs.type == 'dev'
        run: npm version "${{ steps.release.outputs.version }}" --no-git-tag-version

      - name: Strip patchedDependencies from package.json
        if: steps.check.outputs.skip == 'false'
        run: |
          node -e "
            const p = JSON.parse(require('fs').readFileSync('package.json','utf8'));
            delete p.patchedDependencies;
            require('fs').writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');
          "
          echo 'Stripped patchedDependencies for publish'

      - name: Publish (stable)
        if: steps.check.outputs.skip == 'false' && steps.release.outputs.type == 'stable'
        run: npm publish --provenance --access public --tag latest

      - name: Publish (dev)
        if: steps.check.outputs.skip == 'false' && steps.release.outputs.type == 'dev'
        run: npm publish --provenance --access public --tag dev --ignore-scripts

      - name: Build plugin binaries
        if: steps.check.outputs.skip == 'false' && steps.release.outputs.type == 'stable'
        run: bun run build:plugin

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false' && steps.release.outputs.type == 'stable'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          TAG="v$VERSION"
          git tag "$TAG"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "$TAG"
          PRERELEASE_FLAG=""
          if [ "${{ steps.release.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          cat > release-notes.md <<EOF
          **Install:** \`bunx open-zk-kb@$VERSION\`
          **npm:** https://www.npmjs.com/package/open-zk-kb/v/$VERSION
          **Claude Code plugin:** \`/plugin install github:mrosnerr/open-zk-kb/plugin\`
          EOF
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG \
            plugin/bin/open-zk-kb-darwin-arm64 \
            plugin/bin/open-zk-kb-darwin-x64 \
            plugin/bin/open-zk-kb-linux-x64 \
            plugin/bin/open-zk-kb-linux-arm64 \
            plugin/bin/open-zk-kb-windows-x64.exe

      - name: Install mcp-publisher
        if: steps.check.outputs.skip == 'false' && steps.release.outputs.type == 'stable'
        run: |
          curl -fsSL -o mcp-publisher.tar.gz "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz"
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher.tar.gz" | sha256sum -c -
          tar xz -f mcp-publisher.tar.gz mcp-publisher
          rm mcp-publisher.tar.gz

      - name: Publish to MCP Registry
        if: steps.check.outputs.skip == 'false' && steps.release.outputs.type == 'stable'
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
