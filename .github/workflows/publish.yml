name: Publish to npm

on:
  push:
    branches: [main, dev]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine release type
        id: release
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            LOCAL_VERSION=$(node -p "require('./package.json').version")
            {
              echo "version=$LOCAL_VERSION"
              echo "tag=latest"
              echo "type=stable"
              if echo "$LOCAL_VERSION" | grep -qE '(alpha|beta|rc)'; then
                echo "prerelease=true"
              else
                echo "prerelease=false"
              fi
            } >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            BASE_VERSION=$(node -p "require('./package.json').version")
            SHORT_SHA=$(git rev-parse --short HEAD)
            DEV_VERSION="${BASE_VERSION}-dev.g${SHORT_SHA}"
            {
              echo "version=$DEV_VERSION"
              echo "tag=dev"
              echo "type=dev"
              echo "prerelease=true"
            } >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Unexpected branch '${{ github.ref_name }}' — skipping publish."
            echo "type=skip" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if version already published
        if: steps.release.outputs.type != 'skip'
        id: check
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          PUBLISHED=$(npm view open-zk-kb@"$VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already published — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION not yet published — will publish."
          fi

      - name: Determine stable release completion
        if: steps.release.outputs.type == 'stable'
        id: stable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          VERSION: ${{ steps.release.outputs.version }}
          NPM_PUBLISHED: ${{ steps.check.outputs.skip }}
        run: |
          TAG="v$VERSION"
          TAG_SHA=$(gh api "repos/$GH_REPO/git/matching-refs/tags/$TAG" \
            --jq "map(select(.ref == \"refs/tags/$TAG\"))[0].object.sha // \"\"")
          if [ "$NPM_PUBLISHED" = "true" ] && [ -n "$TAG_SHA" ] && [ "$TAG_SHA" != "$COMMIT_SHA" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION was already released from $TAG_SHA; no stable release work is needed for $COMMIT_SHA."
          elif [ "$NPM_PUBLISHED" = "false" ] && [ -n "$TAG_SHA" ] && [ "$TAG_SHA" != "$COMMIT_SHA" ]; then
            echo "::error::Tag $TAG already points to $TAG_SHA before npm publication; expected $COMMIT_SHA"
            exit 1
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false' || steps.stable.outputs.run == 'true'
        run: bun install

      - name: Build
        if: steps.check.outputs.skip == 'false' || steps.stable.outputs.run == 'true'
        run: bun run build

      - name: Lint
        if: steps.check.outputs.skip == 'false' || steps.stable.outputs.run == 'true'
        run: bun run lint

      - name: Test
        if: steps.check.outputs.skip == 'false' || steps.stable.outputs.run == 'true'
        run: bun test

      - name: Build plugin binaries
        if: steps.stable.outputs.run == 'true'
        run: bun run build:plugin

      - name: Install mcp-publisher
        if: steps.stable.outputs.run == 'true'
        run: |
          curl -fsSL -o mcp-publisher.tar.gz "https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz"
          echo "ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  mcp-publisher.tar.gz" | sha256sum -c -
          tar xz -f mcp-publisher.tar.gz mcp-publisher
          rm mcp-publisher.tar.gz

      - name: Prepare bin scripts
        if: steps.check.outputs.skip == 'false' || steps.stable.outputs.run == 'true'
        run: chmod +x dist/cli.js dist/setup.js dist/mcp-server.js

      - name: Set dev version in package.json
        if: steps.check.outputs.skip == 'false' && steps.release.outputs.type == 'dev'
        run: npm version "${{ steps.release.outputs.version }}" --no-git-tag-version

      - name: Strip patchedDependencies from package.json
        if: steps.check.outputs.skip == 'false' || steps.stable.outputs.run == 'true'
        run: |
          node -e "
            const p = JSON.parse(require('fs').readFileSync('package.json','utf8'));
            delete p.patchedDependencies;
            require('fs').writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');
          "
          echo 'Stripped patchedDependencies for publish'

      - name: Publish (stable)
        if: steps.check.outputs.skip == 'false' && steps.stable.outputs.run == 'true'
        run: npm publish --provenance --access public --tag latest

      - name: Publish (dev)
        if: steps.check.outputs.skip == 'false' && steps.release.outputs.type == 'dev'
        run: npm publish --provenance --access public --tag dev --ignore-scripts

      - name: Create or update GitHub Release
        if: steps.stable.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          VERSION: ${{ steps.release.outputs.version }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          TAG="v$VERSION"
          TAG_SHA=$(gh api "repos/$GH_REPO/git/matching-refs/tags/$TAG" \
            --jq "map(select(.ref == \"refs/tags/$TAG\"))[0].object.sha // \"\"")
          if [ -z "$TAG_SHA" ]; then
            gh api --method POST "repos/$GH_REPO/git/refs" \
              -f ref="refs/tags/$TAG" \
              -f sha="$COMMIT_SHA"
          elif [ "$TAG_SHA" != "$COMMIT_SHA" ]; then
            echo "::error::Existing tag $TAG points to $TAG_SHA, expected $COMMIT_SHA"
            exit 1
          fi
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          cat > release-notes.md <<EOF
          **Install:** \`bunx open-zk-kb@$VERSION\`
          **npm:** https://www.npmjs.com/package/open-zk-kb/v/$VERSION
          **Claude Code plugin:** \`/plugin install github:mrosnerr/open-zk-kb/plugin\`
          EOF
          ASSETS=(
            plugin/bin/open-zk-kb-darwin-arm64
            plugin/bin/open-zk-kb-darwin-x64
            plugin/bin/open-zk-kb-linux-x64
            plugin/bin/open-zk-kb-linux-arm64
            plugin/bin/open-zk-kb-windows-x64.exe
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              $PRERELEASE_FLAG \
              "${ASSETS[@]}"
          fi

      - name: Publish to MCP Registry
        if: steps.stable.outputs.run == 'true'
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
