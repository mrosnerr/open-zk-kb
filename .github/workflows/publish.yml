name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version already published
        id: version-check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          PUBLISHED=$(npm view open-zk-kb@"$LOCAL_VERSION" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$LOCAL_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL_VERSION already published — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL_VERSION not yet published — will publish."
          fi

      - name: Install dependencies
        if: steps.version-check.outputs.skip == 'false'
        run: bun install

      - name: Build
        if: steps.version-check.outputs.skip == 'false'
        run: bun run build

      - name: Lint
        if: steps.version-check.outputs.skip == 'false'
        run: bun run lint

      - name: Test
        if: steps.version-check.outputs.skip == 'false'
        run: bun test

      - name: Publish
        if: steps.version-check.outputs.skip == 'false'
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        if: steps.version-check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version-check.outputs.local_version }}"
          TAG="v$VERSION"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "**Install:** \`bunx open-zk-kb@$VERSION\`
          **npm:** https://www.npmjs.com/package/open-zk-kb/v/$VERSION" \
            --latest
