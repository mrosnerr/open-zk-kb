name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Publish
        run: npm publish --access public

      - name: Append npm link to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          EXISTING_BODY=$(gh release view "$RELEASE_TAG" --json body -q .body)
          FOOTER=$(printf '\n---\n\n**Install:** `npm install open-zk-kb@%s`\n**npm:** https://www.npmjs.com/package/open-zk-kb/v/%s' "$VERSION" "$VERSION")
          gh release edit "$RELEASE_TAG" --notes "${EXISTING_BODY}${FOOTER}"
