name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  # Prevent analytics from reaching PostHog during CI runs.
  # Respects the consoledonottrack.com convention.
  DO_NOT_TRACK: "1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (type-check + compile)
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Coverage report
        run: bun test --coverage

  smoke:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Smoke tests (install, MCP protocol, KB round-trip)
        run: bash tests/docker/smoke-test.sh

      # Non-blocking: these tests spawn dist/cli.js subprocesses and are timing-sensitive on shared hosted runners; failures are surfaced in the job log but do not fail the build.
      - name: Stdio bridge integration tests
        run: INTEGRATION_TESTS=1 bun test tests/stdio-bridge.test.ts --timeout 120000
        continue-on-error: true

  model-smoke:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Cache embedding model
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/open-zk-kb/models/Xenova/all-MiniLM-L6-v2
          key: embedding-model-all-MiniLM-L6-v2-${{ runner.os }}

      - name: Local model smoke tests
        run: LOCAL_MODELS=1 bash tests/docker/smoke-test.sh
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        timeout-minutes: 10
