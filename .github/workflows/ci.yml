name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (type-check + compile)
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Coverage report
        run: bun test --coverage

  smoke:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Smoke tests (install, MCP protocol, KB round-trip)
        run: bash tests/docker/smoke-test.sh

  model-smoke:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Cache embedding model
        uses: actions/cache@v5
        with:
          path: ~/.cache/open-zk-kb/models/Xenova/all-MiniLM-L6-v2
          key: embedding-model-all-MiniLM-L6-v2-${{ runner.os }}

      - name: Local model smoke tests
        run: LOCAL_MODELS=1 bash tests/docker/smoke-test.sh
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
        timeout-minutes: 10
