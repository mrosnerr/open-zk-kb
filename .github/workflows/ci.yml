name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  # Prevent analytics from reaching PostHog during CI runs.
  # Respects the consoledonottrack.com convention.
  DO_NOT_TRACK: "1"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (type-check + compile)
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Coverage report
        run: bun test --coverage

      - name: Validate Transformers patch
        run: |
          # Bun applies patches at install via patchedDependencies.
          # Verify the patched markers exist in both source and dist bundle.
          # If this fails, the patch needs regenerating for the current
          # @huggingface/transformers version.
          # JavaScript template literals are intentionally protected from shell expansion.
          # shellcheck disable=SC2016
          node -e '
            const fs = require("fs");
            const checks = [
              ["src/backends/onnx.js", "const ONNX_NODE = undefined;"],
              ["src/utils/image.js", "Image processing is unavailable in this build."],
              ["src/utils/model-loader.js", "getModelFile(pretrained_model_name_or_path, fullPath, true, options, false)"],
              ["dist/transformers.node.mjs", "const ONNX_NODE = undefined;"],
              ["dist/transformers.node.mjs", "Image processing is unavailable in this build."],
            ];
            const base = "node_modules/@huggingface/transformers/";
            let ok = true;
            for (const [file, marker] of checks) {
              const content = fs.readFileSync(base + file, "utf-8");
              if (!content.includes(marker)) {
                console.error(`FAIL: ${file} missing marker: ${marker}`);
                ok = false;
              }
            }
            if (!ok) process.exit(1);
            console.log("Transformers patch verified: all markers present");
          '

  smoke:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Smoke tests (install, MCP protocol, KB round-trip)
        run: bash tests/docker/smoke-test.sh
        env:
          OPEN_ZK_KB_EPHEMERAL_SMOKE: "1"

      # Non-blocking: these tests spawn dist/cli.js subprocesses and are timing-sensitive on shared hosted runners; failures are surfaced in the job log but do not fail the build.
      - name: Stdio bridge integration tests
        run: INTEGRATION_TESTS=1 bun test tests/stdio-bridge.test.ts --timeout 120000
        continue-on-error: true

  model-smoke:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Cache embedding model
        id: embedding-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ runner.temp }}/open-zk-kb-model-cache/open-zk-kb/models/Xenova/all-MiniLM-L6-v2
          key: embedding-model-all-MiniLM-L6-v2-${{ runner.os }}

      - name: Prime embedding model cache
        if: steps.embedding-cache.outputs.cache-hit != 'true'
        run: bun -e "import { generateEmbedding, DEFAULT_EMBEDDING_CONFIG } from './dist/embeddings.js'; const result = await generateEmbedding('cache prime', DEFAULT_EMBEDDING_CONFIG); if (!result) process.exit(1);"
        env:
          XDG_CACHE_HOME: ${{ runner.temp }}/open-zk-kb-model-cache

      - name: Local model smoke tests
        run: LOCAL_MODELS=1 bash tests/docker/smoke-test.sh
        env:
          OPEN_ZK_KB_EPHEMERAL_SMOKE: "1"
          OPEN_ZK_KB_MODEL_CACHE_SEED: ${{ runner.temp }}/open-zk-kb-model-cache/open-zk-kb/models/Xenova/all-MiniLM-L6-v2
        timeout-minutes: 10
