name: PR Agent Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches:
      - main
      - dev
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  pr_agent:
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
       startsWith(github.event.comment.body, '/') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: false
    name: PR Agent
    steps:
      - name: Run PR Agent
        uses: qodo-ai/pr-agent@eb4cdbb115dfb711375a24eccc75e3ef73ec03bc # v0.30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER__KEY: ${{ secrets.OPENROUTER_API_KEY }}
          config.model: "openrouter/deepseek/deepseek-v4-pro"
          config.fallback_models: '["openrouter/moonshotai/kimi-k2.6"]'
          config.custom_model_max_tokens: "128000"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'
          pr_reviewer.require_ticket_analysis_review: "false"
          pr_reviewer.require_estimate_effort_to_review: "false"
          pr_reviewer.enable_review_labels_effort: "false"
          pr_code_suggestions.publish_output_no_suggestions: "false"
          pr_reviewer.publish_output_no_suggestions: "false"
