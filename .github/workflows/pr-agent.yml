  consolidate_reviews:
    needs: [pr_agent_claude, pr_agent_gpt54]
    if: ${{ always() && needs.pr_agent_claude.result != 'cancelled' && needs.pr_agent_gpt54.result != 'cancelled' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: pr-agent-consolidated-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: false
    name: Consolidate shadow PR-Agent reviews
    steps:
      - name: Publish consolidated summary
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        env:
          CLAUDE_REVIEW_JSON: ${{ needs.pr_agent_claude.outputs.review_json }}
          GPT54_REVIEW_JSON: ${{ needs.pr_agent_gpt54.outputs.review_json }}
          CLAUDE_JOB_RESULT: ${{ needs.pr_agent_claude.result }}
          GPT54_JOB_RESULT: ${{ needs.pr_agent_gpt54.result }}
        with:
          script: |
            const CONSOLIDATED_MARKER = '<!-- pr-agent-consolidated-review:v2 -->';
            const STATE_START = '<!-- pr-agent-consolidated-state';
            const MODELS = [
              { envKey: 'CLAUDE_REVIEW_JSON', resultKey: 'CLAUDE_JOB_RESULT', label: 'Claude Sonnet 4.6' },
              { envKey: 'GPT54_REVIEW_JSON', resultKey: 'GPT54_JOB_RESULT', label: 'GPT-5.4' },
            ];
            const SEVERITY_ORDER = { P0: 0, P1: 1, P2: 2 };

            function getPrNumber(payload) {
              return payload.pull_request?.number ?? payload.issue?.number ?? null;
            }

            function shortSha(sha) {
              return sha ? sha.slice(0, 7) : 'unknown';
            }

            function commitUrl(owner, repo, sha) {
              return `https://github.com/${owner}/${repo}/commit/${sha}`;
            }

            function hashId(input) {
              return require('node:crypto').createHash('sha1').update(input).digest('hex').slice(0, 12);
            }

            function parseState(body) {
              if (!body || !body.includes(STATE_START)) {
                return { version: 1, findings: {} };
              }

              const match = body.match(/<!-- pr-agent-consolidated-state\n([\s\S]*?)\n-->/);
              if (!match) {
                return { version: 1, findings: {} };
              }

              try {
                const parsed = JSON.parse(match[1]);
                return parsed && typeof parsed === 'object' ? parsed : { version: 1, findings: {} };
              } catch (error) {
                core.warning(`Failed to parse consolidated state: ${error.message}`);
                return { version: 1, findings: {} };
              }
            }

            function stripMarkup(text) {
              return String(text ?? '')
                .replace(/```[\s\S]*?```/g, ' ')
                .replace(/<summary>/g, ' ')
                .replace(/<\/summary>/g, ' ')
                .replace(/<[^>]+>/g, ' ')
                .replace(/\[[^\]]+\]\([^\)]+\)/g, ' ')
                .replace(/&nbsp;/g, ' ')
                .replace(/&amp;/g, '&')
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .replace(/\s+/g, ' ')
                .trim();
            }

            function extractSeverity(title) {
              const match = String(title).match(/^P([012])\b/);
              return match ? `P${match[1]}` : null;
            }

            function extractSeverityFromFields(title, summary) {
              const titleSeverity = extractSeverity(title);
              if (titleSeverity) return titleSeverity;
              const combined = `${title} ${summary}`;
              if (/\bP0\b/.test(combined)) return 'P0';
              if (/\bP1\b/.test(combined)) return 'P1';
              if (/\bP2\b/.test(combined)) return 'P2';
              return null;
            }

            function normalizeReview(rawJson, model) {
              if (!rawJson) {
                return null;
              }

              let parsed;
              try {
                parsed = JSON.parse(rawJson);
              } catch (error) {
                core.warning(`Failed to parse ${model} review JSON: ${error.message}`);
                return null;
              }

              const review = parsed && typeof parsed === 'object' && parsed.review && typeof parsed.review === 'object'
                ? parsed.review
                : parsed;

              if (!review || typeof review !== 'object') {
                core.warning(`Unexpected ${model} review payload shape.`);
                return null;
              }

              const findings = [];
              for (const issue of Array.isArray(review.key_issues_to_review) ? review.key_issues_to_review : []) {
                const title = stripMarkup(issue.issue_header || issue.relevant_file || 'Untitled finding');
                const summary = stripMarkup(issue.issue_content || title);
                findings.push({
                  model,
                  file: issue.relevant_file || 'unknown',
                  startLine: Number.isFinite(issue.start_line) ? issue.start_line : null,
                  endLine: Number.isFinite(issue.end_line) ? issue.end_line : null,
                  title,
                  summary,
                  severity: extractSeverityFromFields(title, summary),
                });
              }

              return {
                model,
                score: review.score ?? null,
                securityConcerns: stripMarkup(review.security_concerns || ''),
                relevantTests: stripMarkup(review.relevant_tests || ''),
                findings,
              };
            }

            function significantWords(text) {
              const stopwords = new Set(['the', 'a', 'an', 'in', 'on', 'at', 'to', 'for', 'of', 'with', 'by', 'from', 'is', 'are', 'was', 'were', 'be', 'been', 'has', 'have', 'had', 'not', 'no', 'and', 'or', 'but', 'that', 'this', 'it', 'its', 'fix', 'should', 'must', 'nit']);
              return String(text || '')
                .toLowerCase()
                .split(/\W+/)
                .filter((word) => word.length > 2 && !stopwords.has(word));
            }

            function overlap(a, b) {
              const wordsA = new Set(significantWords(a));
              const wordsB = new Set(significantWords(b));
              if (wordsA.size === 0 || wordsB.size === 0) return 0;
              const intersection = [...wordsA].filter((word) => wordsB.has(word)).length;
              return intersection / Math.min(wordsA.size, wordsB.size);
            }

            function locationKey(finding) {
              if (finding.file && finding.startLine != null) {
                return `${finding.file}:${finding.startLine}:${finding.endLine ?? finding.startLine}`;
              }
              return null;
            }

            function findingIdentity(finding) {
              const loc = locationKey(finding);
              if (loc) return loc;
              return `hash:${hashId(`${finding.title}\n${finding.summary}`)}`;
            }

            function groupConsensus(findings) {
              const groups = [];
              const used = new Set();

              for (let i = 0; i < findings.length; i++) {
                if (used.has(i)) continue;
                const group = [findings[i]];
                used.add(i);

                for (let j = i + 1; j < findings.length; j++) {
                  if (used.has(j)) continue;
                  if (findings[i].model === findings[j].model) continue;

                  const sameLocation = locationKey(findings[i]) && locationKey(findings[i]) === locationKey(findings[j]);
                  const textA = `${findings[i].title} ${findings[i].summary}`;
                  const textB = `${findings[j].title} ${findings[j].summary}`;
                  if (sameLocation || overlap(textA, textB) >= 0.35) {
                    group.push(findings[j]);
                    used.add(j);
                  }
                }

                groups.push(group);
              }

              return groups;
            }

            function chooseRepresentative(group) {
              return group.reduce((best, current) => {
                const bestRank = SEVERITY_ORDER[best.severity] ?? 3;
                const currentRank = SEVERITY_ORDER[current.severity] ?? 3;
                if (currentRank < bestRank) return current;
                if (currentRank === bestRank && current.title.length > best.title.length) return current;
                return best;
              });
            }

            function latestMatchingComment(comments, marker) {
              return comments
                .filter((comment) => (comment.body || '').includes(marker))
                .sort((a, b) => new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at))[0];
            }

            function renderReviewerStatus(review, result) {
              if (review) {
                return 'captured';
              }
              if (result === 'success') {
                return 'no structured output';
              }
              return result || 'unknown';
            }

            function mergeCurrentGroups(groups) {
              return groups.map((group) => {
                const rep = chooseRepresentative(group);
                const flaggedBy = [...new Set(group.map((finding) => finding.model))].sort();
                return {
                  id: findingIdentity(rep),
                  title: rep.title,
                  summary: rep.summary,
                  severity: rep.severity,
                  file: rep.file,
                  startLine: rep.startLine,
                  endLine: rep.endLine,
                  flaggedBy,
                };
              }).sort((a, b) => {
                const severityDiff = (SEVERITY_ORDER[a.severity] ?? 3) - (SEVERITY_ORDER[b.severity] ?? 3);
                if (severityDiff !== 0) return severityDiff;
                if (b.flaggedBy.length !== a.flaggedBy.length) return b.flaggedBy.length - a.flaggedBy.length;
                return a.title.localeCompare(b.title);
              });
            }

            function locationText(finding) {
              if (finding.file !== 'unknown' && finding.startLine != null) {
                return ` (${finding.file}:${finding.startLine}${finding.endLine && finding.endLine !== finding.startLine ? `-${finding.endLine}` : ''})`;
              }
              return '';
            }

            function buildNextState(previousState, activeFindings, headSha, nowIso) {
              const next = { version: 1, updatedAt: nowIso, findings: {} };
              const previous = previousState?.findings || {};
              const activeIds = new Set(activeFindings.map((finding) => finding.id));

              for (const finding of activeFindings) {
                const prior = previous[finding.id] || {};
                next.findings[finding.id] = {
                  ...finding,
                  status: 'active',
                  firstSeenAt: prior.firstSeenAt || nowIso,
                  firstSeenHead: prior.firstSeenHead || headSha,
                  lastSeenAt: nowIso,
                  lastSeenHead: headSha,
                  resolvedAt: null,
                  resolvedHead: null,
                };
              }

              for (const [id, finding] of Object.entries(previous)) {
                if (activeIds.has(id)) continue;
                next.findings[id] = {
                  ...finding,
                  status: 'resolved',
                  resolvedAt: finding.resolvedAt || nowIso,
                  resolvedHead: finding.resolvedHead || headSha,
                };
              }

              return next;
            }

            const prNumber = getPrNumber(context.payload);
            if (!prNumber) {
              core.info('No pull request number in this event; skipping consolidated summary.');
              return;
            }

            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const reviewerData = MODELS.map((model) => ({
              label: model.label,
              result: process.env[model.resultKey] || 'unknown',
              review: normalizeReview(process.env[model.envKey], model.label),
            }));

            const availableReviews = reviewerData.filter((reviewer) => reviewer.review);
            if (availableReviews.length === 0) {
              core.warning('No reviewer JSON outputs were available; skipping consolidated summary.');
              return;
            }

            const findingsByModel = {};
            const allFindings = [];
            for (const reviewer of availableReviews) {
              findingsByModel[reviewer.label] = reviewer.review.findings;
              allFindings.push(...reviewer.review.findings);
            }

            const groups = groupConsensus(allFindings);
            const activeFindings = mergeCurrentGroups(groups);

            const pull = context.payload.pull_request || (await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            })).data;
            const headSha = pull?.head?.sha || '';
            const existing = latestMatchingComment(comments, CONSOLIDATED_MARKER);
            const previousState = parseState(existing?.body || '');
            const nowIso = new Date().toISOString();
            const nextState = buildNextState(previousState, activeFindings, headSha, nowIso);
            const resolvedFindings = Object.values(nextState.findings)
              .filter((finding) => finding.status === 'resolved')
              .sort((a, b) => new Date(b.resolvedAt || 0) - new Date(a.resolvedAt || 0));

            const lines = [
              CONSOLIDATED_MARKER,
              '## PR-Agent Review',
              '',
              'Single evolving review comment. The upstream PR-Agent reviewer jobs run in shadow mode; this comment is updated in place on each review run and keeps resolved findings collapsed below the active set.',
              '',
              `Latest reviewed head: [\`${shortSha(headSha)}\`](${commitUrl(owner, repo, headSha)})`,
              '',
              '### Reviewer Status',
              '',
            ];

            for (const reviewer of reviewerData) {
              lines.push(`- **${reviewer.label}** — ${renderReviewerStatus(reviewer.review, reviewer.result)}`);
            }

            if (availableReviews.length < reviewerData.length) {
              lines.push('');
              lines.push('> [!warning] Only one reviewer output was available for this run. The consolidated findings below reflect the surviving shadow review output.');
            }

            lines.push('');
            lines.push('### Active Issues');
            lines.push('');

            if (activeFindings.length === 0) {
              lines.push('- No active structured issues reported by the shadow reviewers.');
            } else {
              for (const finding of activeFindings) {
                const agreement = finding.flaggedBy.length > 1 ? 'both reviewers' : finding.flaggedBy[0];
                lines.push(`- **${finding.title}**${locationText(finding)} — flagged by ${agreement}`);
                if (finding.summary) lines.push(`  - ${finding.summary}`);
              }
            }

            lines.push('');
            lines.push('### Reviewer Notes');
            lines.push('');

            for (const reviewer of availableReviews) {
              lines.push(`#### ${reviewer.label}`);
              lines.push(`- Score: ${reviewer.review.score ?? 'n/a'}`);
              lines.push(`- Security concerns: ${reviewer.review.securityConcerns || 'None reported'}`);
              lines.push(`- Relevant tests: ${reviewer.review.relevantTests || 'Not specified'}`);
              lines.push(`- Structured findings: ${reviewer.review.findings.length}`);

              lines.push('');
            }

            if (resolvedFindings.length > 0) {
              lines.push('<details>');
              lines.push(`<summary>Resolved issues (${resolvedFindings.length})</summary>`);
              lines.push('');
              for (const finding of resolvedFindings) {
                const resolvedText = finding.resolvedAt ? new Date(finding.resolvedAt).toISOString().slice(0, 10) : 'this run';
                const agreement = (finding.flaggedBy || []).length > 1 ? 'both reviewers' : (finding.flaggedBy || [])[0] || 'one reviewer';
                lines.push(`- **${finding.title}**${locationText(finding)} — previously flagged by ${agreement}, resolved by ${resolvedText}`);
                if (finding.summary) lines.push(`  - ${finding.summary}`);
              }
              lines.push('');
              lines.push('</details>');
              lines.push('');
            }

            lines.push('<!-- pr-agent-consolidated-state');
            lines.push(JSON.stringify(nextState, null, 2));
            lines.push('-->');

            const body = lines.join('\n').trim();

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated consolidated summary comment ${existing.id}.`);
            } else {
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
              core.info(`Created consolidated summary comment ${created.data.id}.`);
            }
