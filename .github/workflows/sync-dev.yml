name: Sync dev after main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Sync dev with main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main dev
          git checkout dev
          
          # Try fast-forward first (cleanest)
          if git merge --ff-only origin/main; then
            echo "Fast-forward succeeded"
          else
            # If dev has diverged, create a merge commit
            echo "Fast-forward failed, creating merge commit..."
            git merge origin/main -m "Merge main into dev (auto-sync)"
          fi
          git push origin dev
