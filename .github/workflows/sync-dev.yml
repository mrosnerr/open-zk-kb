name: Sync dev after main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fast-forward dev to main
        run: |
          git fetch origin main dev
          git checkout dev
          git merge --ff-only origin/main
          git push origin dev
