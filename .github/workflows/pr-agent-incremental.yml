name: PR Agent Incremental Review

# Posts /review -i on new pushes to trigger incremental (changes-only) reviews.
# The pr-agent Action variant can't pass -i to auto_review, so we route through
# the comment-based command interface. The existing pr-agent workflows pick up
# the comment via their issue_comment trigger and run the incremental review.

on:
  pull_request:
    types: [synchronize]
    branches:
      - main
      - dev

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  post_incremental_review:
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 2
    concurrency:
      group: pr-agent-incr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Post /review -i comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            // Dedup: skip if a /review -i was posted by the bot within the last 60s
            const { data: recent } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 5,
              sort: 'created',
              direction: 'desc',
            });

            const sixtySecondsAgo = Date.now() - 60 * 1000;
            const duplicate = recent.find(
              (c) =>
                c.user.login === 'github-actions[bot]' &&
                c.body.trim() === '/review -i' &&
                new Date(c.created_at).getTime() > sixtySecondsAgo
            );

            if (duplicate) {
              core.info(`Recent /review -i already posted (${duplicate.id}), skipping`);
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: '/review -i',
            });

            core.info(`Posted /review -i on PR #${prNumber}`);
