# PR Agent configuration for open-zk-kb
# Docs: https://www.pr-agent.ai
#
# CONFIG LOADING: pr-agent reads this file from the repo's DEFAULT branch (= dev),
# not main, not the PR base. Source: qodo-ai/pr-agent github_provider.py:730
# (`get_repo_settings` calls `get_contents(".pr_agent.toml")` without a ref,
# defaulting to the default branch). So changes here take effect for all PRs
# once they merge to dev.
#
# ENV VAR OVERRIDE MECHANISM (2026-04-30):
# pr-agent uses Dynaconf for config. Both dotted (config.model) and
# double-underscore (CONFIG__MODEL) env var formats work — Dynaconf's
# _dotted_set handles both via dynaconf/base.py L1172-1178.
#
# CRITICAL: apply_repo_settings() (git_providers/utils.py) loads this TOML
# and calls get_settings().set(section, merged_dict, merge=False) which
# OVERWRITES any env-var-set values for keys present in the TOML. Only keys
# NOT present in this TOML survive as env var overrides. Therefore model,
# fallback_models, and pr_reviewer.extra_instructions are set per-workflow
# via env vars and MUST NOT appear in this file. See PR #114 root-cause.
#
# GITHUB_ACTION_CONFIG.* settings survive because github_action_runner.py
# re-reads them via get_setting_or_env() AFTER apply_repo_settings().
#
# extra_instructions SCOPE: controls what the LLM thinks about (categories,
# severity language, what NOT to flag, WHEN/THEN/BECAUSE rules) but CANNOT
# override pr-agent's hardcoded output format/title. Title `## PR Reviewer
# Guide 🔍` is a Python enum constant; output schema is rigid Pydantic.
# See: agent-architecture/04-References/pr-agent-extra-instructions-scope.md

[config]
# model + fallback_models: set per-workflow via CONFIG__MODEL / CONFIG__FALLBACK_MODELS
# env vars. DO NOT add them here — apply_repo_settings() would clobber the env vars.
# See header comment and PR #114 for the root-cause analysis.
custom_model_max_tokens = 200000
ai_timeout = 300
response_language = "en-US"
reasoning_effort = "medium"
add_repo_metadata = true
add_repo_metadata_file_list = ["AGENTS.md"]
patch_extra_lines_before = 10
patch_extra_lines_after = 3
allow_dynamic_context = true
max_extra_lines_before_dynamic_context = 20
ignore_pr_title = ["^\\[Auto\\]", "^dependabot", "^renovate"]

[github_action_config]
# `synchronize` omitted: Action variant can't pass `-i` to auto_review.
# For incremental re-review on push, post `/review -i` as a PR comment.
pr_actions = ["opened", "reopened", "ready_for_review"]

[ignore]
glob = [
    "dist/**",
    "node_modules/**",
    "*.lock",
    "*.lockb",
    "*.snap",
    "*.gif",
    "*.png",
    "*.jpg",
    "*.svg",
    "*.map",
]

# ---------------------------------------------------------------------------
# Review Tool
# ---------------------------------------------------------------------------
[pr_reviewer]
# persistent_comment=true edits the review comment in-place on re-review,
# destroying the initial findings with no edit history in the API.
# PR #110 showed this: initial review (commits 1-4, Kimi K2.6) was overwritten
# by re-review (commits 1-7) after fixes landed — findings lost irrecoverably.
# With false, each /review creates a separate comment preserving full history.
persistent_comment = false
final_update_message = false
num_max_findings = 12
inline_code_comments = true
require_score_review = true
require_security_review = true
require_tests_review = true
require_estimate_effort_to_review = false
require_ticket_analysis_review = false
enable_review_labels_security = true
enable_review_labels_effort = false
publish_output_no_suggestions = true
# extra_instructions: set per-workflow via PR_REVIEWER__EXTRA_INSTRUCTIONS env var.
# Each workflow carries the full instruction block with its own model badge.
# DO NOT add extra_instructions here — apply_repo_settings() would clobber env vars.

# ---------------------------------------------------------------------------
# Code Suggestions Tool
# ---------------------------------------------------------------------------
[pr_code_suggestions]
focus_only_on_problems = true
suggestions_score_threshold = 3
num_code_suggestions_per_chunk = 5
# commitable_code_suggestions = true posts each suggestion as a separate inline
# GitHub review comment with a native ```suggestion``` block (the "Commit
# suggestion" button you see on Greptile/CodeRabbit comments). Clicking that
# button is a manual action that creates a commit authored by the clicker —
# pr-agent itself never commits. Source: pr_code_suggestions.py L573-L575 +
# github_provider.py:417 (calls pr.create_review, not git_commit).
commitable_code_suggestions = true
publish_output_no_suggestions = true
# auto_extended_mode + max_number_of_calls > 1 causes timeouts on Kimi K2.6
# with reasoning_effort=high. Empirical evidence (PR #108, 2026-04-29):
# auto_extended_mode=true + max_number_of_calls=3 produced 70K total tokens
# (Kimi K2.6 33K + GLM 5.1 fallback 37K) in 15min before the 15-min workflow
# timeout killed it — pr-agent batches all extended-mode predictions before
# publishing, so partial results never surface. Single-pass mode finishes
# in ~3-5 min and produces actionable per-line suggestions.
# To re-enable extended mode later: bump pr-agent.yml timeout-minutes to 30,
# OR swap to a faster model (Sonnet 4.6 ~3-5x faster), OR drop reasoning_effort
# to "medium" for /improve specifically (no per-tool override mechanism in OSS).
auto_extended_mode = false
max_number_of_calls = 1
parallel_calls = true

extra_instructions = """\
Focus suggestions on these open-zk-kb-specific anti-patterns:

1. CONSOLE IN SERVER: Replace console.log/warn/error with logToFile() from
   src/logger.ts. MCP stdio requires clean stdout. Exception: src/setup.ts
   and scripts/ (CLI output is fine).

2. TYPE SAFETY: Flag `as any`, `@ts-ignore`, `@ts-expect-error`. Suggest
   proper types or generics instead.

3. MISSING TIMEOUT: Any fetch(), database query, or external service call
   without an explicit timeout is a bug.

4. RESOURCE LEAK: Ensure context managers are used for file handles and
   database connections. Flag bare resource acquisition without cleanup.

5. FTS5 TRIGGER: Never add SQLite FTS5 triggers. Manual FTS management
   (ftsInsert/ftsDelete/ftsUpdate) is intentional for TEXT primary key reliability.

6. NODE.JS API: Flag any Node.js API usage (fs, path, crypto, http).
   This project uses Bun APIs exclusively (Bun.file, Bun.write, etc.).

7. LIFECYCLE VIOLATION: Flag any code that mutates snapshot notes or
   overwrites append-only note content without using appendToLogContent().

Do NOT suggest:
- Import reordering or formatting changes (ESLint handles this)
- Adding comments to self-explanatory code
- Node.js alternatives to Bun APIs
"""

# ---------------------------------------------------------------------------
# Description Tool
# ---------------------------------------------------------------------------
[pr_description]
generate_ai_title = false
use_bullet_points = true
add_original_user_description = true
enable_semantic_files_types = true
publish_labels = true

extra_instructions = """\
Structure the description to include:
- **Modules affected**: storage, tool-handlers, mcp-server, config, setup, prompts, docs
- **Backward compatibility**: whether existing APIs, config keys, or note formats changed
- **Ownership boundary**: which layer owns this change (server/agent/behavioral guidance)
Use technical language appropriate for a library/SDK project.
"""

# ---------------------------------------------------------------------------
# Best Practices
# ---------------------------------------------------------------------------
[best_practices]
content = """\
- Factory pattern: export createXxx() instead of exporting class directly
- Never console.log in server code — MCP requires clean stdout; use logToFile()
- SQLite: parameterized queries only, handle SQLITE_BUSY with retries
- Dual storage: Markdown files are source of truth, DB is index only
- Note status transitions: fleeting -> permanent -> archived
- Note lifecycle values: living (mutable) | snapshot (immutable) | append-only (additive)
- Snapshot notes are immutable after creation — reject updates with LifecycleViolationError
- Append-only notes (index, log) require new content to strictly extend existing content
- STRUCTURAL_KINDS (index, log) are auto-generated — block manual creation in handleStore
- XDG paths for all storage: vault, config, logs
- Tests use bun:test with createTestHarness()/cleanupTestHarness()
- Commits: capitalized imperative, no prefix, no trailing period
- Ownership: server surfaces data with annotations, never returns directives
"""
